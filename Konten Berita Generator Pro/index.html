<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Gambar Berita Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <!-- Tambahkan tombol kembali -->
    <script src="../tombol-kembali.js"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DV25BYV3TL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DV25BYV3TL');
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
        }

        .form-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 400px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
        }

        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .btn-simpan { background-color: #2e7d32; }
        .btn-share { background-color: #1565c0; }
        .btn:hover { opacity: 0.9; }

        .container-berita {
            position: relative;
            width: 400px;
            height: 450px;
            background-color: #ddd;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container-berita img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
        }

        .konten-teks {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            color: white;
        }

        .judul-berita {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .bg-oranye { 
            background-color: rgba(255, 152, 0, 0.5);
            color: white; 
            padding: 1px 8px; 
            border-radius: 3px; 
            display: inline-block; 
            margin-bottom: 0.5px; 
        }
        .putih { 
            background-color: rgba(255, 255, 255, 0.5); 
            color: white;
            padding: 1px 8px; 
            border-radius: 3px; 
            display: inline-block; 
            margin-bottom: 2px;
            text-shadow: 0 0 5px rgba(0,0,0,0.6), 0 0 2px rgba(0,0,0,0.8);
        }
        .bg-biru { 
            background-color: rgba(30, 58, 138, 0.5);
            color: white; 
            padding: 2px 8px; 
            border-radius: 3px; 
            display: inline-block; 
        }

        .sumber-foto {
            font-size: 11px;
            color: #ccc;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <h2>Konten Berita Generator Pro</h2>
    
    <div class="form-panel">
        <div class="form-group">
            <label>1. Pilih Gambar</label>
            <input type="file" id="upload-gambar" accept="image/*">
        </div>
        
        <div class="form-group">
            <label>2. Teks Berita (Gunakan Enter untuk Baris Baru)</label>
            <textarea id="input-berita" rows="3">Pendamping Pkh
Melakukan kegiatan P2K2 
Guna Merubah mindset</textarea>
        </div>
        
        <!-- TAMBAHAN: Input untuk sumber foto -->
        <div class="form-group">
            <label>3. Sumber Foto</label>
            <input type="text" id="input-foto" value="Foto: Istimewa">
        </div>

        <div class="btn-group">
            <button class="btn btn-simpan" id="btn-simpan">💾 Simpan Gambar</button>
            <button class="btn btn-share" id="btn-share">📢 Bagikan</button>
        </div>
    </div>

    <div class="container-berita" id="area-berita">
        <img id="preview-img" src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=400&q=80" alt="Berita" crossorigin="anonymous">
        <div class="overlay"></div>
        <div class="konten-teks">
            <div class="sumber-foto" id="text-foto">Foto: Istimewa</div>
            <div class="judul-berita">
                <span class="bg-oranye" id="text-baris1">Pendamping PKH</span><br>
                <span class="putih" id="text-baris2">Melakukan kegiatan P2K2</span><br>
                <span class="bg-biru" id="text-baris3">Guna Merubah mindset</span>
            </div>
        </div>
    </div>

    <script>
        // Ambil elemen-elemen yang dibutuhkan
        const uploadGambar = document.getElementById('upload-gambar');
        const inputBerita = document.getElementById('input-berita');
        const inputFoto = document.getElementById('input-foto'); // sekarang ada

        const previewImg = document.getElementById('preview-img');
        const textBaris1 = document.getElementById('text-baris1');
        const textBaris2 = document.getElementById('text-baris2');
        const textBaris3 = document.getElementById('text-baris3');
        const textFoto = document.getElementById('text-foto');

        const btnSimpan = document.getElementById('btn-simpan');
        const btnShare = document.getElementById('btn-share');
        const areaBerita = document.getElementById('area-berita');

        // --- Penyesuaian tinggi container berdasarkan rasio gambar ---
        previewImg.addEventListener('load', function() {
            const lebarAsli = this.naturalWidth;
            const tinggiAsli = this.naturalHeight;
            
            if (lebarAsli && tinggiAsli) {
                const lebarContainer = 400; 
                const tinggiProporsional = (tinggiAsli / lebarAsli) * lebarContainer;
                areaBerita.style.height = tinggiProporsional + 'px';
            }
        });

        // --- Upload gambar ---
        uploadGambar.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.setAttribute('src', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        // --- Update teks berita (per baris) ---
        inputBerita.addEventListener('input', function() {
            const baris = this.value.split('\n');

            if (baris[0] && baris[0].trim() !== "") {
                textBaris1.textContent = baris[0];
                textBaris1.style.display = "inline-block";
            } else {
                textBaris1.style.display = "none";
            }

            if (baris[1] && baris[1].trim() !== "") {
                textBaris2.textContent = baris[1];
                textBaris2.style.display = "inline-block";
            } else {
                textBaris2.style.display = "none";
            }

            if (baris[2] && baris[2].trim() !== "") {
                textBaris3.textContent = baris[2];
                textBaris3.style.display = "inline-block";
            } else {
                textBaris3.style.display = "none";
            }
        });

        // --- Update sumber foto ---
        inputFoto.addEventListener('input', function() {
            textFoto.textContent = this.value;
        });

        // --- INISIALISASI AWAL: sinkronkan tampilan dengan nilai default ---
        inputBerita.dispatchEvent(new Event('input'));
        inputFoto.dispatchEvent(new Event('input'));

        // --- FITUR SIMPAN GAMBAR (dengan async/await) ---
        btnSimpan.addEventListener('click', async function() {
            try {
                // Pastikan gambar sudah dimuat sepenuhnya
                const img = previewImg;
                if (!img.complete) {
                    await new Promise((resolve) => img.onload = resolve);
                }

                // Ambil screenshot dengan opsi yang lebih baik
                const canvas = await html2canvas(areaBerita, {
                    useCORS: true,
                    scale: 2,           // kualitas lebih tinggi
                    allowTaint: false,
                    backgroundColor: null,
                    logging: false,
                });

                // Download otomatis
                const link = document.createElement('a');
                link.download = 'berita-media-sosial.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error('Gagal menyimpan gambar:', err);
                alert('Terjadi kesalahan saat menyimpan gambar: ' + err.message);
            }
        });

        // --- FITUR BAGIKAN (dengan async/await) ---
        btnShare.addEventListener('click', async function() {
            try {
                const img = previewImg;
                if (!img.complete) {
                    await new Promise((resolve) => img.onload = resolve);
                }

                const canvas = await html2canvas(areaBerita, {
                    useCORS: true,
                    scale: 2,
                    allowTaint: false,
                });

                canvas.toBlob(blob => {
                    const file = new File([blob], "berita.png", { type: "image/png" });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'Berita Hari Ini',
                            text: textBaris1.textContent + " " + textBaris2.textContent
                        })
                        .then(() => console.log('Berhasil membagikan!'))
                        .catch((error) => console.log('Gagal membagikan:', error));
                    } else {
                        alert("Browser Anda tidak mendukung fitur share langsung. Silakan gunakan tombol 'Simpan Gambar' terlebih dahulu, lalu unggah manual ke media sosial.");
                    }
                }, 'image/png');
            } catch (err) {
                console.error('Gagal membagikan:', err);
                alert('Gagal membagikan: ' + err.message);
            }
        });
    </script>

</body>
</html>
